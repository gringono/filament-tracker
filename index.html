<div id="root"></div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>

<script type="text/babel">
const {useState,useEffect,useRef,useCallback}=React;

const VERSION="v4.0";
const STORAGE_KEY="filament_v3";
const API_KEY_KEY="filament_apikey";
const PRINTERS_KEY="filament_printers";
const DEFAULT_PRINTERS=["Bambu H2C","VCore 4.1","HevOrt"];
const MATERIALS=["PLA","PETG","ABS","ASA","ABS-GF","XPETG","TPU","PA","PC","PVA","HIPS","CF","Sonstiges"];
const DIAMETERS=[1.75,2.85];

const MINT="#86efac",BG="#080c0a",SURFACE="#0e1410",SURFACE2="#141c16";
const BORDER="#1a2e1e",TEXT="#d4f0dc",TEXT_DIM="#8ecf9a",TEXT_MUTED="#4a7a56";
const mono={fontFamily:"'IBM Plex Mono',monospace"};

// ── Storage ──
function loadFilaments(){try{return JSON.parse(localStorage.getItem(STORAGE_KEY))||[];}catch{return[];}}
function saveFilaments(d){localStorage.setItem(STORAGE_KEY,JSON.stringify(d));}
function loadApiKey(){return localStorage.getItem(API_KEY_KEY)||"";}
function saveApiKey(k){localStorage.setItem(API_KEY_KEY,k);}
function loadPrinters(){try{return JSON.parse(localStorage.getItem(PRINTERS_KEY))||DEFAULT_PRINTERS;}catch{return DEFAULT_PRINTERS;}}
function savePrinters(p){localStorage.setItem(PRINTERS_KEY,JSON.stringify(p));}

function genId(){return Math.random().toString(36).slice(2,9)+Date.now().toString(36);}

// ── Backup ──
function exportBackup(filaments,printers){
  const data={version:"3.6",exported:new Date().toISOString(),filaments,printers};
  const blob=new Blob([JSON.stringify(data,null,2)],{type:"application/json"});
  const url=URL.createObjectURL(blob);
  const a=document.createElement("a");
  a.href=url;
  a.download=`filament-backup-${new Date().toISOString().slice(0,10)}.json`;
  a.click();
  URL.revokeObjectURL(url);
}
function importBackup(file,onSuccess,onError){
  const reader=new FileReader();
  reader.onload=e=>{
    try{
      const data=JSON.parse(e.target.result);
      if(!data.filaments)throw new Error("Ungültiges Format");
      onSuccess(data);
    }catch(err){onError(err.message);}
  };
  reader.readAsText(file);
}

function calcPct(w,full){if(!full)return 0;return Math.min(100,Math.max(0,Math.round(w/full*100)));}

function gramColor(w,full){
  if(!full||w<=100)return"#ff2020";
  const t=Math.min(1,(w-100)/(full-100));
  const r=t<0.5?255:Math.round(255*(1-(t-0.5)*2));
  const g=t<0.5?Math.round(t*2*200):200;
  return`rgb(${r},${g},0)`;
}

// ── AI Scan ──
async function scanLabel(b64,mediaType,mode,apiKey){
  const sys=mode==="add"
    ?`Filament label reader. Return ONLY valid JSON no markdown: {"brand":"","material":"PLA","colorName":"","colorHex":"#aaaaaa","diameter":1.75,"fullWeight":1000,"notes":""}. fullWeight in grams default 1000.`
    :`Filament label reader. Return ONLY valid JSON: {"brand":"","material":"","colorName":"","colorHex":""}`;
  const res=await fetch("https://api.anthropic.com/v1/messages",{
    method:"POST",
    headers:{"Content-Type":"application/json","x-api-key":apiKey,"anthropic-version":"2023-06-01","anthropic-dangerous-direct-browser-access":"true"},
    body:JSON.stringify({model:"claude-haiku-4-5",max_tokens:500,system:sys,
      messages:[{role:"user",content:[
        {type:"image",source:{type:"base64",media_type:mediaType,data:b64}},
        {type:"text",text:"Extract filament info."}
      ]}]
    })
  });
  const data=await res.json();
  if(data.error)throw new Error(data.error.message);
  const text=data.content?.map(b=>b.text||"").join("")||"{}";
  return JSON.parse(text.replace(/```json|```/g,"").trim());
}

function matchScore(fil,scan){
  let s=0;
  if(scan.brand&&fil.brand?.toLowerCase().includes(scan.brand.toLowerCase()))s+=3;
  if(scan.material&&fil.material?.toLowerCase()===scan.material.toLowerCase())s+=3;
  if(scan.colorName&&fil.colorName?.toLowerCase().includes(scan.colorName.toLowerCase()))s+=2;
  if(scan.colorHex&&fil.colorHex){
    try{
      const p=h=>[parseInt(h.slice(1,3),16),parseInt(h.slice(3,5),16),parseInt(h.slice(5,7),16)];
      const [r1,g1,b1]=p(scan.colorHex),[r2,g2,b2]=p(fil.colorHex);
      if(Math.sqrt((r1-r2)**2+(g1-g2)**2+(b1-b2)**2)<60)s+=1;
    }catch{}
  }
  return s;
}

// ── UI Primitives ──
const inputStyle={...mono,background:SURFACE,border:`1px solid ${BORDER}`,borderRadius:6,
  color:TEXT,padding:"8px 10px",fontSize:13,width:"100%",boxSizing:"border-box",outline:"none",WebkitAppearance:"none"};
const labelCss={...mono,color:TEXT_DIM,fontSize:10,marginBottom:3,display:"block",letterSpacing:"0.08em"};

function ColorChip({hex,size=28}){
  return <div style={{width:size,height:size,borderRadius:4,background:hex||"#333",border:`1px solid rgba(134,239,172,0.15)`,flexShrink:0}}/>;
}
function RemainingBar({weight,fullWeight}){
  const pct=calcPct(weight,fullWeight);
  const color=gramColor(weight,fullWeight);
  return <div style={{width:"100%",height:4,background:"#0e1c12",borderRadius:3,overflow:"hidden"}}>
    <div style={{width:`${pct}%`,height:"100%",background:color,transition:"width 0.3s,background 0.3s"}}/>
  </div>;
}
function Badge({color,bg,children}){
  return <span style={{...mono,background:bg||SURFACE2,color:color||TEXT_DIM,fontSize:10,padding:"2px 7px",borderRadius:4,whiteSpace:"nowrap"}}>{children}</span>;
}
function Field({label,children}){
  return <div style={{display:"flex",flexDirection:"column"}}><span style={labelCss}>{label}</span>{children}</div>;
}
function PhotoButton({label,onChange,loading}){
  const ref=useRef();
  return <>
    <button onClick={()=>ref.current.click()} style={{
      width:"100%",padding:"12px 0",background:"#051828",
      border:`1.5px solid ${loading?"#facc15":"#00cfff"}`,borderRadius:8,
      color:loading?"#facc15":"#00cfff",cursor:"pointer",fontSize:13,...mono,
      boxShadow:loading?"none":"0 0 12px rgba(0,207,255,0.35),inset 0 0 20px rgba(0,207,255,0.07)"
    }}>{loading?"⏳ Scanne...":label}</button>
    <input ref={ref} type="file" accept="image/*" capture="environment" onChange={onChange} style={{display:"none"}}/>
  </>;
}
function Modal({title,children,onClose}){
  return <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.92)",zIndex:100,display:"flex",alignItems:"flex-end",justifyContent:"center"}}>
    <div style={{background:SURFACE,border:`1px solid ${BORDER}`,borderRadius:"16px 16px 0 0",
      width:"100%",maxWidth:520,maxHeight:"94vh",overflowY:"auto",
      padding:"20px 16px calc(24px + env(safe-area-inset-bottom))",display:"flex",flexDirection:"column",gap:12}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
        <span style={{color:MINT,fontWeight:700,fontSize:16,...mono}}>{title}</span>
        <button onClick={onClose} style={{background:"none",border:"none",color:TEXT_DIM,fontSize:22,cursor:"pointer",lineHeight:1}}>✕</button>
      </div>
      {children}
    </div>
  </div>;
}

// ── Printer Combo ──
function PrinterSelect({value,onChange,printers}){
  const [custom,setCustom]=useState(false);
  const [customVal,setCustomVal]=useState("");
  function handleSelect(v){
    if(v==="__new__"){setCustom(true);setCustomVal("");}
    else{setCustom(false);onChange(v);}
  }
  function confirmCustom(){
    const v=customVal.trim();
    if(v){onChange(v);setCustom(false);}
  }
  return <div style={{display:"flex",flexDirection:"column",gap:4}}>
    <select style={inputStyle} value={custom?"__new__":value} onChange={e=>handleSelect(e.target.value)}>
      <option value="">— kein Drucker —</option>
      {printers.map(p=><option key={p}>{p}</option>)}
      <option value="__new__">✏️ Neuer Drucker...</option>
    </select>
    {custom&&<div style={{display:"flex",gap:6}}>
      <input style={{...inputStyle,flex:1}} value={customVal} onChange={e=>setCustomVal(e.target.value)}
        placeholder="Druckername..." autoFocus onKeyDown={e=>e.key==="Enter"&&confirmCustom()}/>
      <button onClick={confirmCustom} style={{background:MINT,color:"#000",border:"none",borderRadius:6,padding:"0 12px",cursor:"pointer",fontWeight:700,...mono}}>OK</button>
    </div>}
  </div>;
}

// ── Material Combo ──
function loadCustomMats(){try{return JSON.parse(localStorage.getItem("custom_materials")||"[]");}catch{return[];}}
function saveCustomMat(m){if(!m||MATERIALS.includes(m))return;const cur=loadCustomMats();if(!cur.includes(m)){localStorage.setItem("custom_materials",JSON.stringify([...cur,m]));}}

function MaterialCombo({value,onChange}){
  const [custom,setCustom]=useState(!MATERIALS.includes(value)&&!!value);
  const customMats=loadCustomMats();
  const allMats=[...MATERIALS,...customMats.filter(m=>!MATERIALS.includes(m))];
  return <div style={{display:"flex",flexDirection:"column",gap:4}}>
    <select style={inputStyle} value={custom?"__custom__":value}
      onChange={e=>{if(e.target.value==="__custom__"){setCustom(true);onChange("");}else{setCustom(false);onChange(e.target.value);}}}>
      {allMats.map(m=><option key={m}>{m}</option>)}
      <option value="__custom__">✏️ Eigene Eingabe...</option>
    </select>
    {custom&&<input style={{...inputStyle,borderColor:MINT}} value={value}
      onChange={e=>onChange(e.target.value)}
      onBlur={e=>saveCustomMat(e.target.value)}
      placeholder="z.B. PLA-CF, PAHT..." autoFocus/>}
  </div>;
}


// ── Location Storage + Combo ──
function loadCustomLocs(){try{return JSON.parse(localStorage.getItem("custom_locations")||"[]");}catch{return[];}}
function saveCustomLoc(l){if(!l)return;const cur=loadCustomLocs();if(!cur.includes(l)){localStorage.setItem("custom_locations",JSON.stringify([...cur,l]));}}

function LocationCombo({value,onChange}){
  const locs=loadCustomLocs();
  const [custom,setCustom]=useState(locs.length>0&&!locs.includes(value)&&!!value);
  return <div style={{display:"flex",flexDirection:"column",gap:4}}>
    {locs.length>0
      ?<select style={inputStyle} value={custom?"__custom__":value||""}
          onChange={e=>{if(e.target.value==="__custom__"){setCustom(true);onChange("");}else{setCustom(false);onChange(e.target.value);}}}>
          <option value="">— Lagerort wählen —</option>
          {locs.map(l=><option key={l}>{l}</option>)}
          <option value="__custom__">✏️ Neuer Lagerort...</option>
        </select>
      :<input style={inputStyle} value={value} onChange={e=>onChange(e.target.value)}
          onBlur={e=>saveCustomLoc(e.target.value)} placeholder="Lagerort (z.B. Regal-A)"/>
    }
    {custom&&<input style={{...inputStyle,borderColor:MINT}} value={value}
      onChange={e=>onChange(e.target.value)}
      onBlur={e=>{saveCustomLoc(e.target.value);}}
      placeholder="z.B. Regal-A, Box-2..." autoFocus/>}
  </div>;
}

// ── QR Scanner Screen ──
function QRScannerScreen({filaments}){
  const [result,setResult]=useState(null);
  const [error,setError]=useState("");
  const [status,setStatus]=useState("Wird gestartet...");
  const scannerRef=useRef(null);
  const divId="qr-reader-filament";

  useEffect(()=>{
    startScanner();
    return ()=>stopScanner();
  },[]);

  function startScanner(){
    setError("");setResult(null);setStatus("Kamera wird geöffnet...");
    if(scannerRef.current){
      scannerRef.current.stop().catch(()=>{}).finally(()=>{
        scannerRef.current.clear();
        scannerRef.current=null;
        document.getElementById(divId).innerHTML="";
        initScanner();
      });
    }else{
      initScanner();
    }
  }

  function initScanner(){
    try{
      const scanner=new Html5Qrcode(divId);
      scannerRef.current=scanner;
      scanner.start(
        {facingMode:"environment"},
        {fps:10,qrbox:{width:250,height:250},aspectRatio:1.0},
        (text)=>{
          stopScanner();
          setResult(text.trim());
        },
        ()=>{}
      ).then(()=>{
        setStatus("QR-Code in den Rahmen halten...");
      }).catch(e=>{
        setError("Kamerazugriff verweigert: "+e);
      });
    }catch(e){setError("Fehler: "+e.message);}
  }

  function stopScanner(){
    if(scannerRef.current){
      scannerRef.current.stop().catch(()=>{}).finally(()=>{
        scannerRef.current.clear();
        scannerRef.current=null;
      });
    }
  }

  const matched=result?filaments.filter(f=>
    f.stock?.some(s=>(s.location||"").toLowerCase()===result.toLowerCase())
  ):[];

  return <div style={{padding:"12px 14px",display:"flex",flexDirection:"column",gap:12}}>
    {!result&&<>
      <div style={{...mono,color:TEXT_DIM,fontSize:11,textAlign:"center"}}>QR-Code am Regal scannen</div>
      <div id={divId} style={{borderRadius:10,overflow:"hidden",border:`2px solid ${MINT}`,background:"#000"}}/>
      {error
        ?<div style={{...mono,color:"#f87171",fontSize:11,textAlign:"center"}}>{error}</div>
        :<div style={{...mono,color:TEXT_DIM,fontSize:10,textAlign:"center"}}>{status}</div>
      }
    </>}

    {result&&<>
      <div style={{display:"flex",alignItems:"center",gap:10,padding:"10px 12px",background:"#071a0e",borderRadius:8,border:`1px solid ${MINT}`}}>
        <span style={{fontSize:20}}>📦</span>
        <div>
          <div style={{...mono,color:MINT,fontSize:13,fontWeight:700}}>{result}</div>
          <div style={{...mono,color:TEXT_DIM,fontSize:10}}>{matched.length} Filament-Typ{matched.length!==1?"en":""} gelagert</div>
        </div>
      </div>

      {matched.length===0&&<div style={{...mono,color:TEXT_DIM,fontSize:12,textAlign:"center",padding:"20px 0"}}>
        Keine Spulen für „{result}" gefunden.<br/>
        <span style={{fontSize:10}}>Lagerort beim Erfassen genau so eintragen.</span>
      </div>}

      {matched.map(f=>{
        const spools=f.stock.filter(s=>(s.location||"").toLowerCase()===result.toLowerCase());
        return <div key={f.id} style={{background:SURFACE2,borderRadius:8,padding:"10px 12px",border:`1px solid ${BORDER}`}}>
          <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:6}}>
            <ColorChip hex={f.colorHex} size={22}/>
            <div>
              <div style={{...mono,color:TEXT,fontSize:13,fontWeight:700}}>{f.brand} {f.colorName}</div>
              <div style={{...mono,color:TEXT_DIM,fontSize:10}}>{f.material} · {f.diameter}mm</div>
            </div>
          </div>
          {spools.map(s=>(
            <div key={s.id} style={{display:"flex",justifyContent:"space-between",padding:"4px 0",borderTop:`1px solid ${BORDER}`}}>
              <span style={{...mono,color:TEXT_DIM,fontSize:11}}>Spule</span>
              <span style={{...mono,color:s.weight>=(f.fullWeight||1000)?MINT:s.weight<=100?"#f87171":"#facc15",fontSize:11,fontWeight:700}}>{s.weight}g ({calcPct(s.weight,f.fullWeight||1000)}%)</span>
            </div>
          ))}
        </div>;
      })}

      <button onClick={startScanner} style={{...mono,background:SURFACE2,color:TEXT_DIM,border:`1px solid ${BORDER}`,borderRadius:8,padding:"11px 0",cursor:"pointer",fontSize:12}}>↩ Nochmal scannen</button>
    </>}
  </div>;
}
function ListView({filaments,onEdit}){
  if(filaments.length===0)return(
    <div style={{textAlign:"center",padding:"40px 0",...mono,color:TEXT_DIM,fontSize:12}}>Keine Filamente vorhanden</div>
  );

  const groups={};
  filaments.forEach(fil=>{
    const mat=fil.material||"?";
    if(!groups[mat])groups[mat]=[];
    const fw=fil.fullWeight||1000;

    const fullByLoc={};
    (fil.stock||[]).filter(s=>s.weight>=fw).forEach(s=>{
      const loc=s.location||"Lager";
      fullByLoc[loc]=(fullByLoc[loc]||0)+1;
    });
    Object.entries(fullByLoc).forEach(([loc,cnt])=>{
      groups[mat].push({type:"full",fil,brand:fil.brand,colorName:fil.colorName,colorHex:fil.colorHex,loc,weight:fw,count:cnt});
    });

    (fil.stock||[]).filter(s=>s.weight<fw).forEach(s=>{
      groups[mat].push({type:"partial",fil,brand:fil.brand,colorName:fil.colorName,colorHex:fil.colorHex,loc:s.location||"Lager",weight:s.weight,count:1});
    });

    (fil.inUse||[]).forEach(u=>{
      groups[mat].push({type:"inuse",fil,brand:fil.brand,colorName:fil.colorName,colorHex:fil.colorHex,loc:u.printer,weight:u.weight,count:1});
    });
  });

  const sorted=Object.entries(groups).sort((a,b)=>a[0].localeCompare(b[0]));
  const rowColor={full:MINT,partial:"#facc15",inuse:"#60a5fa"};
  const rowIcon={full:"●",partial:"◑",inuse:"▶"};
  const rowBg={full:"#071a0e",partial:"#1a1400",inuse:"#030d1a"};
  const rowBorder={full:"#0e3018",partial:"#2e2000",inuse:"#0a1e30"};

  return <div style={{display:"flex",flexDirection:"column",gap:12}}>
    {sorted.map(([mat,rows])=>(
      <div key={mat}>
        <div style={{...mono,color:TEXT_DIM,fontSize:10,letterSpacing:"0.12em",marginBottom:5,paddingLeft:2}}>{mat}</div>
        <div style={{display:"flex",flexDirection:"column",gap:3}}>
          {rows.map((row,i)=>(
            <div key={i} onClick={()=>onEdit&&onEdit(row.fil)}
              style={{display:"flex",alignItems:"center",gap:8,padding:"5px 8px",background:rowBg[row.type],borderRadius:5,border:`1px solid ${rowBorder[row.type]}`,cursor:"pointer"}}>
              <span style={{color:rowColor[row.type],fontSize:11,width:12,flexShrink:0}}>{rowIcon[row.type]}</span>
              <div style={{width:12,height:12,borderRadius:2,background:row.colorHex||"#555",flexShrink:0,border:"1px solid rgba(255,255,255,0.1)"}}/>
              <span style={{...mono,color:TEXT,fontSize:11,width:72,flexShrink:0,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{row.brand}</span>
              <span style={{...mono,color:TEXT_DIM,fontSize:11,flex:1,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{row.colorName}</span>
              <span style={{...mono,color:TEXT_DIM,fontSize:11,width:60,flexShrink:0,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",textAlign:"right"}}>{row.loc}</span>
              <span style={{...mono,color:row.type==="inuse"&&row.weight<=100?"#ff2020":rowColor[row.type],fontSize:11,fontWeight:700,width:46,textAlign:"right",flexShrink:0}}>{row.weight}g</span>
              {row.count>1&&<span style={{...mono,color:TEXT_DIM,fontSize:10,width:24,textAlign:"right",flexShrink:0}}>×{row.count}</span>}
              {row.count===1&&<span style={{width:24,flexShrink:0}}/>}
            </div>
          ))}
        </div>
      </div>
    ))}
  </div>;
}

  </svg>;
}

// ── Filament Card ──
function FilamentCard({fil,onEdit,onDelete}){
  const fw=fil.fullWeight||1000;
  const stock=fil.stock||[];
  const inUse=fil.inUse||[];
  const totalCount=stock.length+inUse.length;
  const hasLow=[...stock,...inUse].some(s=>s.weight<=100);

  const fullStock=stock.filter(s=>s.weight>=fw);
  const partialStock=stock.filter(s=>s.weight<fw);

  // Group full spools by location
  const fullGroups=fullStock.reduce((acc,s)=>{
    const k=s.location||"Lager";
    if(!acc[k])acc[k]=0;
    acc[k]++;
    return acc;
  },{});

  return <div style={{background:SURFACE,border:`1px solid ${inUse.length>0?"#1a4020":BORDER}`,borderRadius:10,padding:"12px 14px",display:"flex",flexDirection:"column",gap:8}}>
    {/* Header */}
    <div style={{display:"flex",alignItems:"center",gap:10}}>
      <ColorChip hex={fil.colorHex} size={32}/>
      <div style={{flex:1,minWidth:0}}>
        <div style={{color:TEXT,fontWeight:700,fontSize:14,...mono,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>
          {fil.brand||"—"} <span style={{color:TEXT_DIM,fontWeight:400}}>{fil.colorName}</span>
        </div>
        <div style={{display:"flex",gap:5,marginTop:3,flexWrap:"wrap"}}>

        <button onClick={()=>onDelete(fil.id)} style={{background:"#1a0808",color:"#f87171",border:"1px solid #2e1010",borderRadius:6,padding:"6px 9px",cursor:"pointer",fontSize:13}}>✕</button>

    {/* Stock */}
    {stock.length>0&&<div style={{borderTop:`1px solid ${BORDER}`,paddingTop:8,display:"flex",flexDirection:"column",gap:4}}>
      <div style={{...mono,color:TEXT_DIM,fontSize:9,letterSpacing:"0.1em",marginBottom:2}}>📦 LAGER</div>

      {/* Full spools — compact, mint green */}
      {Object.entries(fullGroups).map(([loc,cnt])=>(
        <div key={"full-"+loc} style={{display:"flex",alignItems:"center",gap:7,padding:"4px 8px",background:"#071a0e",borderRadius:5,border:"1px solid #0e3018"}}>
          <span style={{color:MINT,fontSize:12}}>●</span>
          <span style={{...mono,color:MINT,fontSize:11,flex:1}}>{cnt>1?`${cnt}× `:""}{loc}</span>
          <span style={{...mono,color:MINT,fontSize:10,opacity:0.7}}>voll · {fw}g</span>

      {/* Partial spools — yellow with bar */}

        <div key={s.id} style={{padding:"6px 8px",background:"#1a1400",borderRadius:5,border:"1px solid #2e2000"}}>
          <div style={{display:"flex",alignItems:"center",gap:7,marginBottom:4}}>
            <span style={{color:"#facc15",fontSize:12}}>◑</span>

            <span style={{...mono,color:u.weight<=100?"#ff2020":"#60a5fa",fontSize:11,fontWeight:700}}>
              {u.weight}g <span style={{color:TEXT_MUTED,fontWeight:400}}>/ {fw}g ({calcPct(u.weight,fw)}%)</span>
            </span>
          </div>
          <RemainingBar weight={u.weight} fullWeight={fw}/>
        </div>
      ))}
    </div>}
  </div>;
}

// ── Add/Edit Modal ──
function FilamentModal({initial,onSave,onClose,onDelete,printers,onAddPrinter}){
  const fw=initial?.fullWeight||1000;
  const [form,setForm]=useState({
    brand:"",material:"PLA",colorName:"",colorHex:"#aaaaaa",
    diameter:1.75,fullWeight:1000,
    stock:[],inUse:[],notes:"",
    ...(initial||{})
  });
  const [scanning,setScanning]=useState(false);
  const [scanError,setScanError]=useState("");
  const [preview,setPreview]=useState(null);
  const set=(k,v)=>setForm(f=>({...f,[k]:v}));

  const fullW=form.fullWeight||1000;

  // Stock helpers
  function addStock(){setForm(f=>({...f,stock:[...f.stock,{id:genId(),location:"Lager",weight:f.fullWeight}]}));}
  function updateStock(id,key,val){setForm(f=>({...f,stock:f.stock.map(s=>s.id===id?{...s,[key]:val}:s)}));}
  function removeStock(id){setForm(f=>({...f,stock:f.stock.filter(s=>s.id!==id)}));}

  // InUse helpers
  function addInUse(){setForm(f=>({...f,inUse:[...f.inUse,{id:genId(),printer:printers[0]||"",weight:f.fullWeight}]}));}
  function updateInUse(id,key,val){setForm(f=>({...f,inUse:f.inUse.map(u=>u.id===id?{...u,[key]:val}:u)}));}
  function removeInUse(id){setForm(f=>({...f,inUse:f.inUse.filter(u=>u.id!==id)}));}

  async function handlePhoto(e){
    const file=e.target.files[0];if(!file)return;
    const apiKey=loadApiKey();
    if(!apiKey){setScanError("Kein API Key. Bitte in ⚙️ eintragen.");return;}
    setScanError("");setScanning(true);
    const reader=new FileReader();
    reader.onload=async()=>{
      const b64=reader.result.split(",")[1];
      setPreview(reader.result);
      try{
        const r=await scanLabel(b64,file.type,"add",apiKey);
        const nw=r.fullWeight||r.totalWeight||form.fullWeight;
        setForm(f=>({...f,
          brand:r.brand||f.brand,
          material:MATERIALS.includes(r.material)?r.material:(r.material||f.material),
          colorName:r.colorName||f.colorName,
          colorHex:r.colorHex||f.colorHex,
          diameter:DIAMETERS.includes(r.diameter)?r.diameter:f.diameter,
          fullWeight:nw,
          notes:r.notes||f.notes,
        }));
      }catch(err){setScanError("Scan fehlgeschlagen: "+err.message);}
      setScanning(false);
    };
    reader.readAsDataURL(file);
  }

  function handleSave(){
    // collect new printers
    const allPrinters=[...new Set([...printers,...form.inUse.map(u=>u.printer).filter(Boolean)])];
    onAddPrinter(allPrinters);
    onSave(form);
  }

  const sectionHead={...mono,color:TEXT_DIM,fontSize:10,letterSpacing:"0.1em",marginBottom:4};
  const addBtn=(label,fn,type="stock")=><button onClick={fn} style={{
    background:type==="stock"?"#001a08":"#00081a",
    border:`1px solid ${type==="stock"?"#00ff6a":"#00aaff"}`,
    borderRadius:6,
    color:type==="stock"?"#00ff6a":"#00aaff",
    padding:"10px 0",cursor:"pointer",fontSize:12,...mono,width:"100%",
    boxShadow:type==="stock"?"0 0 8px rgba(0,255,106,0.25)":"0 0 8px rgba(0,170,255,0.25)",
    fontWeight:700
  }}>{label}</button>;

  return <Modal onClose={onClose} title={initial?.id?"Filament bearbeiten":"Neues Filament"}>
    {!initial?.id&&<div style={{display:"flex",flexDirection:"column",gap:6}}>
      <PhotoButton label="📷 Etikett scannen" onChange={handlePhoto} loading={scanning}/>
      {scanError&&<div style={{color:"#f87171",fontSize:11,...mono}}>{scanError}</div>}
      {preview&&!scanning&&<div style={{display:"flex",alignItems:"center",gap:8}}>
        <img src={preview} alt="" style={{height:46,borderRadius:5,border:`1px solid ${BORDER}`}}/>
        <span style={{...mono,color:MINT,fontSize:10}}>✓ Scan ok — Felder prüfen</span>
      </div>}
    </div>}

    {/* Base info */}
    <div style={{background:SURFACE2,borderRadius:8,padding:"10px 12px",display:"flex",flexDirection:"column",gap:10}}>
      <div style={sectionHead}>FILAMENT-INFO</div>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
        <Field label="HERSTELLER"><input style={inputStyle} value={form.brand} onChange={e=>set("brand",e.target.value)} placeholder="Bambu Lab"/></Field>
        <Field label="FARBE"><input style={inputStyle} value={form.colorName} onChange={e=>set("colorName",e.target.value)} placeholder="Black"/></Field>
      </div>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
        <Field label="MATERIAL"><MaterialCombo value={form.material} onChange={v=>set("material",v)}/></Field>
        <Field label="FARBE (HEX)">
          <div style={{display:"flex",gap:7,alignItems:"center"}}>
            <input type="color" value={form.colorHex} onChange={e=>set("colorHex",e.target.value)}
              style={{width:36,height:36,border:`1px solid ${BORDER}`,borderRadius:6,background:SURFACE,cursor:"pointer",padding:2,flexShrink:0}}/>
            <input style={{...inputStyle,flex:1}} value={form.colorHex} onChange={e=>set("colorHex",e.target.value)}/>
          </div>
        </Field>
      </div>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
        <Field label="DURCHMESSER">
          <select style={inputStyle} value={form.diameter} onChange={e=>set("diameter",parseFloat(e.target.value))}>
            {DIAMETERS.map(d=><option key={d} value={d}>{d} mm</option>)}
          </select>
        </Field>
        <Field label="VOLLGEWICHT (g)"><input style={inputStyle} type="number" value={form.fullWeight} onChange={e=>set("fullWeight",parseInt(e.target.value)||0)}/></Field>
      </div>
    </div>

    {/* Stock */}
    <div style={{background:"#0a2010",border:"2px solid #1a5c2a",borderRadius:10,padding:"12px",display:"flex",flexDirection:"column",gap:8}}>
      <div style={{...mono,color:"#4ade80",fontSize:11,letterSpacing:"0.1em",fontWeight:700,marginBottom:2}}>📦 LAGER ({form.stock.length} Spule{form.stock.length!==1?"n":""})</div>
      {form.stock.map(s=>(
        <div key={s.id} style={{background:"#061209",border:"1px solid #1a5c2a",borderRadius:6,padding:"8px 10px",display:"flex",flexDirection:"column",gap:6}}>
          <div style={{display:"flex",gap:6,alignItems:"center"}}>
            <div style={{flex:1}}><LocationCombo value={s.location} onChange={v=>updateStock(s.id,"location",v)}/></div>
            <input style={{...inputStyle,width:90}} type="number" value={s.weight} onChange={e=>updateStock(s.id,"weight",parseInt(e.target.value)||0)} placeholder="Gramm"/>
            <button onClick={()=>removeStock(s.id)} style={{background:"#1a0808",color:"#f87171",border:"none",borderRadius:5,padding:"6px 8px",cursor:"pointer",fontSize:12,flexShrink:0}}>✕</button>
          </div>
          <div style={{display:"flex",justifyContent:"space-between"}}>
            <span style={{...mono,fontSize:10,color:"#4ade80"}}>{calcPct(s.weight,fullW)}%</span>
            <button onClick={()=>updateStock(s.id,"weight",form.fullWeight)} style={{...mono,background:"none",border:"none",color:TEXT_DIM,fontSize:10,cursor:"pointer",padding:0}}>→ voll ({form.fullWeight}g)</button>
          </div>
          <RemainingBar weight={s.weight} fullWeight={fullW}/>
        </div>
      ))}
      {addBtn("+ Spule im Lager hinzufügen",addStock,"stock")}
    </div>

    {/* In Use */}
    <div style={{background:"#061428",border:"2px solid #1a3f6e",borderRadius:10,padding:"12px",display:"flex",flexDirection:"column",gap:8}}>
      <div style={{...mono,color:"#60a5fa",fontSize:11,letterSpacing:"0.1em",fontWeight:700,marginBottom:2}}><Icon3D color="#60a5fa" size={12}/>IN GEBRAUCH ({form.inUse.length} Spule{form.inUse.length!==1?"n":""})</div>
      {form.inUse.map(u=>(
        <div key={u.id} style={{background:"#030a16",border:"1px solid #1a3f6e",borderRadius:6,padding:"8px 10px",display:"flex",flexDirection:"column",gap:6}}>
          <div style={{display:"flex",gap:6,alignItems:"center"}}>
            <div style={{flex:1}}>
              <PrinterSelect value={u.printer} onChange={v=>updateInUse(u.id,"printer",v)} printers={printers}/>
            </div>
            <input style={{...inputStyle,width:90}} type="number" value={u.weight} onChange={e=>updateInUse(u.id,"weight",parseInt(e.target.value)||0)} placeholder="Gramm"/>
            <button onClick={()=>removeInUse(u.id)} style={{background:"#1a0808",color:"#f87171",border:"none",borderRadius:5,padding:"6px 8px",cursor:"pointer",fontSize:12,flexShrink:0}}>✕</button>
          </div>
          <div style={{display:"flex",justifyContent:"space-between"}}>
            <span style={{...mono,fontSize:10,color:"#60a5fa"}}>{calcPct(u.weight,fullW)}%</span>
            <button onClick={()=>updateInUse(u.id,"weight",form.fullWeight)} style={{...mono,background:"none",border:"none",color:TEXT_DIM,fontSize:10,cursor:"pointer",padding:0}}>→ voll ({form.fullWeight}g)</button>
          </div>
          <RemainingBar weight={u.weight} fullWeight={fullW}/>
        </div>
      ))}
      {addBtn("+ Spule in Drucker hinzufügen",addInUse,"inuse")}
    </div>

    {/* Notes */}
    <Field label="NOTIZEN (z.B. Drucktemperatur, Besonderheiten)">
      <textarea style={{...inputStyle,height:72,resize:"none",lineHeight:1.6}} value={form.notes||""} onChange={e=>set("notes",e.target.value)} placeholder="Temp: 220-230°C, Hotbed: 60-70°C..."/>
    </Field>

    <button onClick={handleSave} style={{
      background:MINT,color:"#000",border:"none",borderRadius:8,
      padding:"13px 0",fontWeight:700,fontSize:15,cursor:"pointer",...mono,width:"100%",marginTop:4
    }}>Speichern</button>
    {initial?.id&&onDelete&&<button onClick={()=>{if(confirm("Filament löschen?"))onDelete(initial.id);}} style={{
      background:"#1a0808",color:"#f87171",border:"1px solid #2e1010",borderRadius:8,
      padding:"11px 0",fontWeight:700,fontSize:13,cursor:"pointer",...mono,width:"100%"
    }}>✕ Filament löschen</button>}
  </Modal>;
}

// ── Move Modal ──
function MoveModal({filaments,onMove,onClose,printers,onAddPrinter}){
  const [step,setStep]=useState("scan");
  const [scanning,setScanning]=useState(false);
  const [scanError,setScanError]=useState("");
  const [preview,setPreview]=useState(null);
  const [matches,setMatches]=useState(null);
  const [showAll,setShowAll]=useState(false);
  const [selectedFil,setSelectedFil]=useState(null);
  const [selectedSpool,setSelectedSpool]=useState(null);
  const [targetPrinter,setTargetPrinter]=useState(printers[0]||"");
  const [returnWeight,setReturnWeight]=useState("");

  async function handlePhoto(e){
    const file=e.target.files[0];if(!file)return;
    const apiKey=loadApiKey();
    if(!apiKey){setScanError("Kein API Key. Bitte in ⚙️ eintragen.");return;}
    setScanError("");setMatches(null);setScanning(true);
    const reader=new FileReader();
    reader.onload=async()=>{
      const b64=reader.result.split(",")[1];
      setPreview(reader.result);
      try{
        const scan=await scanLabel(b64,file.type,"find",apiKey);
        const scored=filaments.map(f=>({fil:f,score:matchScore(f,scan)}))
          .filter(x=>x.score>0).sort((a,b)=>b.score-a.score).slice(0,3);
        setMatches(scored);
        setStep("matches");
      }catch(err){setScanError("Scan fehlgeschlagen: "+err.message);}
      setScanning(false);
    };
    reader.readAsDataURL(file);
  }

  function selectFil(fil){setSelectedFil(fil);setStep("spools");}
  function handleMoveToUse(spool){setSelectedSpool({spool,direction:"toUse"});setTargetPrinter(printers[0]||"");setStep("confirm");}
  function handleMoveToStock(spool){setSelectedSpool({spool,direction:"toStock"});setReturnWeight(String(spool.weight));setStep("confirm");}
  function executeMove(){
    if(!selectedSpool||!selectedFil)return;
    const{spool,direction}=selectedSpool;
    onAddPrinter([...new Set([...printers,...(direction==="toUse"?[targetPrinter]:[])])].filter(Boolean));
    onMove(selectedFil.id,spool.id,direction,direction==="toUse"?targetPrinter:parseInt(returnWeight)||0);
    onClose();
  }

  const stepTitle={scan:"⇄ Filament bewegen",matches:"⇄ Filament wählen",spools:"⇄ Spule wählen",confirm:"⇄ Bestätigen"};

  return <Modal title={stepTitle[step]||"⇄ Filament bewegen"} onClose={onClose}>
    {step==="scan"&&<>
      <div style={{...mono,color:TEXT_DIM,fontSize:11}}>Scanne das Etikett der Spule die du bewegen möchtest.</div>
      <PhotoButton label="📷 Etikett scannen" onChange={handlePhoto} loading={scanning}/>
      {scanError&&<div style={{color:"#f87171",fontSize:11,...mono}}>{scanError}</div>}
      {preview&&!scanning&&<img src={preview} alt="" style={{height:46,borderRadius:5,border:`1px solid ${BORDER}`}}/>}
      <div style={{borderTop:`1px solid ${BORDER}`,paddingTop:10,display:"flex",flexDirection:"column",gap:6}}>
        <div style={{...mono,color:TEXT_DIM,fontSize:10,letterSpacing:"0.08em"}}>ODER MANUELL WÄHLEN</div>
        {filaments.map(f=>(
          <button key={f.id} onClick={()=>selectFil(f)} style={{background:SURFACE2,border:`1px solid ${BORDER}`,borderRadius:8,padding:"8px 12px",cursor:"pointer",display:"flex",alignItems:"center",gap:10,width:"100%",textAlign:"left"}}>
            <ColorChip hex={f.colorHex} size={22}/>
            <div style={{flex:1}}>
              <div style={{...mono,color:TEXT,fontSize:12,fontWeight:700}}>{f.brand} {f.colorName}</div>
              <div style={{...mono,color:TEXT_DIM,fontSize:10}}>{f.material} · Lager: {f.stock?.length||0} · Drucker: {f.inUse?.length||0}</div>
            </div>
          </button>
        ))}
      </div>
    </>}

    {step==="matches"&&<>
      {preview&&<img src={preview} alt="" style={{height:40,borderRadius:5,border:`1px solid ${BORDER}`,marginBottom:4}}/>}
      <div style={{...mono,color:TEXT_DIM,fontSize:10,letterSpacing:"0.08em"}}>TREFFER</div>
      {matches.length===0
        ?<div style={{...mono,color:"#f87171",fontSize:12,textAlign:"center",padding:"12px 0"}}>Kein Treffer — bitte manuell wählen.</div>
        :matches.map(({fil})=>(
          <button key={fil.id} onClick={()=>selectFil(fil)} style={{background:SURFACE2,border:`1px solid ${MINT}`,borderRadius:8,padding:"10px 12px",cursor:"pointer",display:"flex",alignItems:"center",gap:10,width:"100%",textAlign:"left",marginBottom:4}}>
            <ColorChip hex={fil.colorHex} size={28}/>
            <div style={{flex:1}}>
              <div style={{...mono,color:TEXT,fontSize:13,fontWeight:700}}>{fil.brand} {fil.colorName}</div>
              <div style={{...mono,color:TEXT_DIM,fontSize:10}}>{fil.material} · Lager: {fil.stock?.length||0} · Drucker: {fil.inUse?.length||0}</div>
            </div>
          </button>
        ))
      }
      {!showAll&&<button onClick={()=>setShowAll(true)} style={{...mono,background:"none",border:"none",color:TEXT_DIM,fontSize:11,cursor:"pointer",paddingTop:4}}>Nicht dabei? Alle anzeigen ▾</button>}
      {showAll&&filaments.filter(f=>!matches.some(m=>m.fil.id===f.id)).map(f=>(
        <button key={f.id} onClick={()=>selectFil(f)} style={{background:"none",border:`1px dashed ${BORDER}`,borderRadius:8,padding:"8px 12px",cursor:"pointer",display:"flex",alignItems:"center",gap:10,width:"100%",textAlign:"left",marginBottom:3}}>
          <ColorChip hex={f.colorHex} size={20}/>
          <div><div style={{...mono,color:TEXT_DIM,fontSize:12}}>{f.brand} {f.colorName} · {f.material}</div></div>
        </button>
      ))}
    </>}

    {step==="spools"&&selectedFil&&<>
      <div style={{display:"flex",alignItems:"center",gap:10,padding:"8px 12px",background:SURFACE2,borderRadius:8}}>
        <ColorChip hex={selectedFil.colorHex} size={28}/>
        <div>
          <div style={{...mono,color:TEXT,fontSize:13,fontWeight:700}}>{selectedFil.brand} {selectedFil.colorName}</div>
          <div style={{...mono,color:TEXT_DIM,fontSize:10}}>{selectedFil.material}</div>
        </div>
      </div>
      {!(selectedFil.stock?.length)&&!(selectedFil.inUse?.length)&&
        <div style={{...mono,color:"#f87171",fontSize:12,textAlign:"center",padding:"16px 0"}}>Keine Spulen vorhanden.</div>}
      {(selectedFil.stock?.length||0)>0&&<>
        <div style={{...mono,color:TEXT_DIM,fontSize:10,letterSpacing:"0.08em"}}>📦 LAGER → DRUCKER</div>
        {selectedFil.stock.map(s=>(
          <div key={s.id} style={{display:"flex",alignItems:"center",gap:8,padding:"8px 10px",background:"#071a0e",borderRadius:6,border:"1px solid #0e3018"}}>
            <div style={{flex:1}}>
              <div style={{...mono,color:MINT,fontSize:12}}>{s.location||"Lager"}</div>
              <div style={{...mono,color:TEXT_DIM,fontSize:10}}>{s.weight}g ({calcPct(s.weight,selectedFil.fullWeight||1000)}%)</div>
            </div>
            <button onClick={()=>handleMoveToUse(s)} style={{...mono,background:MINT,color:"#000",border:"none",borderRadius:6,padding:"7px 14px",cursor:"pointer",fontWeight:700,fontSize:12,flexShrink:0}}>→ Drucker</button>
          </div>

// ── Scan Delete Modal ──
function ScanDeleteModal({filaments,onDelete,onClose}){
  const [scanning,setScanning]=useState(false);
  const [matches,setMatches]=useState(null);
  const [scanError,setScanError]=useState("");
  const [preview,setPreview]=useState(null);

  async function handlePhoto(e){
    const file=e.target.files[0];if(!file)return;
    const apiKey=loadApiKey();
    if(!apiKey){setScanError("Kein API Key. Bitte in ⚙️ eintragen.");return;}
    setScanError("");setMatches(null);setScanning(true);
    const reader=new FileReader();
    reader.onload=async()=>{
      const b64=reader.result.split(",")[1];
      setPreview(reader.result);
      try{
        const scan=await scanLabel(b64,file.type,"find",apiKey);
        const scored=filaments.map(f=>({fil:f,score:matchScore(f,scan)}))
          .filter(x=>x.score>0).sort((a,b)=>b.score-a.score).slice(0,3);
        setMatches(scored);
      }catch(err){setScanError("Scan fehlgeschlagen: "+err.message);}
      setScanning(false);
    };
    reader.readAsDataURL(file);
  }

  return <Modal onClose={onClose} title="Filament suchen & löschen">
    <div style={{...mono,color:TEXT_DIM,fontSize:11}}>Fotografiere das Etikett des Filaments das du entfernen möchtest.</div>
    <PhotoButton label="📷 Etikett scannen" onChange={handlePhoto} loading={scanning}/>
    {scanError&&<div style={{color:"#f87171",fontSize:11,...mono}}>{scanError}</div>}
    {preview&&<div><img src={preview} alt="" style={{height:46,borderRadius:5,border:`1px solid ${BORDER}`}}/></div>}
    {matches!==null&&<div style={{display:"flex",flexDirection:"column",gap:6}}>
      {matches.length===0
        ?<div style={{...mono,color:"#f87171",fontSize:12,textAlign:"center",padding:"16px 0"}}>Kein passendes Filament gefunden.</div>
        :<>
          <div style={{...mono,color:TEXT_DIM,fontSize:10}}>TREFFER:</div>
          {matches.map(({fil})=>(
            <button key={fil.id}
              onClick={()=>{if(confirm(`"${fil.brand} ${fil.colorName}" löschen?`)){onDelete(fil.id);onClose();}}}
              style={{background:"#180a0a",border:"1px solid #2e1010",borderRadius:8,padding:"10px 12px",cursor:"pointer",display:"flex",alignItems:"center",gap:10,textAlign:"left",width:"100%"}}>
              <ColorChip hex={fil.colorHex} size={28}/>
              <div style={{flex:1}}>
                <div style={{color:TEXT,fontSize:13,fontWeight:700,...mono}}>{fil.brand} {fil.colorName}</div>
                <div style={{color:TEXT_DIM,fontSize:10,...mono}}>{fil.material} · {(fil.stock?.length||0)+(fil.inUse?.length||0)} Spulen</div>
              </div>
              <span style={{...mono,color:"#f87171",fontSize:13}}>✕</span>
            </button>
          ))}
        </>
      }
    </div>}
  </Modal>;
}

function SettingsModal({onClose,printers,onSavePrinters,allFilaments,onImport}){
  const [key,setKey]=useState(loadApiKey());
  const [saved,setSaved]=useState(false);
  const [copied,setCopied]=useState(false);
  const [showKey,setShowKey]=useState(false);
  const [printerList,setPrinterList]=useState(printers.join("\n"));

  function handleSave(){
    saveApiKey(key.trim());
    onSavePrinters(printerList.split("\n").map(p=>p.trim()).filter(Boolean));
    setSaved(true);setTimeout(()=>setSaved(false),1500);
  }
  function handleCopy(){
    if(!key){return;}
    navigator.clipboard.writeText(key).then(()=>{
      setCopied(true);setTimeout(()=>setCopied(false),2000);
    }).catch(()=>{
      // fallback for older iOS
      const el=document.createElement("textarea");
      el.value=key;document.body.appendChild(el);
      el.select();document.execCommand("copy");
      document.body.removeChild(el);
      setCopied(true);setTimeout(()=>setCopied(false),2000);
    });
  }

  return <Modal title="⚙️ Einstellungen" onClose={onClose}>
    <div style={{...mono,color:TEXT_DIM,fontSize:11,lineHeight:1.7}}>
      Für KI-Etikett-Scan: Anthropic API Key<br/>
      <span style={{color:TEXT_DIM}}>1. </span><span style={{color:TEXT}}>console.anthropic.com</span><br/>
      <span style={{color:TEXT_DIM}}>2. </span>Account + Kreditkarte + $5 Guthaben<br/>

      <div style={{display:"flex",gap:6}}>

        </button>
        <button onClick={handleCopy} style={{
          background:copied?"#1a4020":SURFACE2,color:copied?MINT:TEXT_DIM,
          border:`1px solid ${copied?MINT:BORDER}`,borderRadius:6,padding:"0 10px",
          cursor:"pointer",fontSize:12,...mono,flexShrink:0,transition:"all 0.2s"
        }}>{copied?"✓":"Kopieren"}</button>
      </div>
    </Field>
    <Field label="DRUCKER-LISTE (eine pro Zeile)">
      <textarea style={{...inputStyle,height:100,resize:"none",lineHeight:1.6}} value={printerList} onChange={e=>setPrinterList(e.target.value)}/>
    </Field>
    <button onClick={handleSave} style={{
      background:saved?"#1a4020":MINT,color:saved?MINT:"#000",border:saved?`1px solid ${MINT}`:"none",
      borderRadius:8,padding:"12px 0",fontWeight:700,fontSize:14,cursor:"pointer",...mono,width:"100%"
    }}>{saved?"✓ Gespeichert":"Speichern"}</button>
    <div style={{...mono,color:TEXT_MUTED,fontSize:10,textAlign:"center"}}>Key wird nur lokal gespeichert.</div>

    <div style={{borderTop:`1px solid ${BORDER}`,paddingTop:12,display:"flex",flexDirection:"column",gap:8}}>
      <div style={{...mono,color:TEXT_DIM,fontSize:10,letterSpacing:"0.08em"}}>BACKUP</div>
      <button onClick={()=>exportBackup(allFilaments,printers)} style={{
        ...mono,background:SURFACE2,color:MINT,border:`1px solid ${BORDER}`,
        borderRadius:8,padding:"11px 0",fontSize:13,cursor:"pointer",width:"100%"
      }}>⬇ Backup exportieren</button>
      <label style={{
        ...mono,background:SURFACE2,color:"#60a5fa",border:`1px solid ${BORDER}`,
        borderRadius:8,padding:"11px 0",fontSize:13,cursor:"pointer",width:"100%",
        display:"block",textAlign:"center"
      }}>
        ⬆ Backup importieren
        <input type="file" accept=".json" onChange={e=>{
          const file=e.target.files[0];if(!file)return;
          importBackup(file,data=>{
            if(window.confirm(`Backup vom ${data.exported?.slice(0,10)} laden? Aktuelle Daten werden ersetzt.`)){

    </div>
  </Modal>;
}

// ── Main App ──
function App(){
  const [filaments,setFilaments]=useState(loadFilaments);
  const [printers,setPrinters]=useState(loadPrinters);
  const [modal,setModal]=useState(null);
  const [filterMat,setFilterMat]=useState("Alle");
  const [search,setSearch]=useState("");

  useEffect(()=>{saveFilaments(filaments);},[filaments]);
  useEffect(()=>{savePrinters(printers);},[printers]);

  function handleSave(form){
    if(form.id){
      // Editing existing — just save
      setFilaments(f=>f.map(x=>x.id===form.id?form:x));
      setModal(null);
      return;
    }
    // New entry — check for duplicates
    const match=filaments.find(f=>
      f.brand?.toLowerCase()===form.brand?.toLowerCase()&&
      f.material?.toLowerCase()===form.material?.toLowerCase()&&
      f.colorName?.toLowerCase()===form.colorName?.toLowerCase()
    );
    if(match){
      setDupeCheck({existing:match,newForm:form});
      setModal(null);
    } else {
      setFilaments(f=>[...f,{...form,id:genId(),addedAt:Date.now()}]);
      setModal(null);
    }
  }

  function handleMerge(){
    if(!dupeCheck)return;
    const {existing,newForm}=dupeCheck;
    // Add all stock and inUse from newForm to existing
    const merged={
      ...existing,
      stock:[...(existing.stock||[]),...(newForm.stock||[])],
      inUse:[...(existing.inUse||[]),...(newForm.inUse||[])],
    };
    setFilaments(f=>f.map(x=>x.id===existing.id?merged:x));
    setDupeCheck(null);
  }

  function handleForceNew(){
    if(!dupeCheck)return;
    const {newForm}=dupeCheck;
    setFilaments(f=>[...f,{...newForm,id:genId(),addedAt:Date.now()}]);
    setDupeCheck(null);
  }
  function handleMove(filId,spoolId,direction,data){
    setFilaments(f=>f.map(fil=>{
      if(fil.id!==filId)return fil;
      if(direction==="toUse"){
        const spool=fil.stock.find(s=>s.id===spoolId);
        if(!spool)return fil;
        return {...fil,stock:fil.stock.filter(s=>s.id!==spoolId),inUse:[...fil.inUse,{id:spool.id,printer:data,weight:spool.weight}]};
      }else{
        const spool=fil.inUse.find(u=>u.id===spoolId);
        if(!spool)return fil;
        return {...fil,inUse:fil.inUse.filter(u=>u.id!==spoolId),stock:[...fil.stock,{id:spool.id,location:"Lager",weight:data}]};
      }
    }));
  }

  function handleDelete(id){
    if(confirm("Filament löschen?"))setFilaments(f=>f.filter(x=>x.id!==id));
  }
  function handleAddPrinter(list){
    setPrinters(list);
  }

  const total=filaments.length;
  const uniqueMats=new Set(filaments.map(f=>f.material)).size;
  const totalSpools=filaments.reduce((a,f)=>(f.stock?.length||0)+(f.inUse?.length||0)+a,0);
  const lowCount=filaments.filter(f=>[...(f.stock||[]),...(f.inUse||[])].some(s=>s.weight<=100)).length;
  const inUseCount=filaments.reduce((a,f)=>a+(f.inUse?.length||0),0);
  const usedMats=["Alle",...new Set(filaments.map(f=>f.material))];

  const filtered=filaments.filter(f=>{
    if(filterMat!=="Alle"&&f.material!==filterMat)return false;
    if(search){const q=search.toLowerCase();if(!`${f.brand} ${f.colorName} ${f.material}`.toLowerCase().includes(q))return false;}
    return true;
  });

  const isMobile=window.innerWidth<=600;
  const [tab,setTab]=useState("cards"); // "cards" | "list"
  const [screen,setScreen]=useState("home"); // "home" | "inventory"
  const [dupeCheck,setDupeCheck]=useState(null);

            {uniqueMats} Materialien · {totalSpools} Spulen
            {lowCount>0&&<span style={{color:"#f87171"}}> · {lowCount} fast leer</span>}
            {inUseCount>0&&<span style={{color:MINT}}> · {inUseCount} in Drucker</span>}

        <div style={{display:"flex",gap:8,alignItems:"center"}}>

        {total} Typen · {totalSpools} Spulen{inUseCount>0&&<span style={{color:MINT}}> · {inUseCount} in Drucker</span>}

    {screen==="inventory"&&<div style={{padding:"12px 14px",display:"flex",flexDirection:"column",gap:10}}>
      {actionBtnsSmall}
      {total>0&&<>
        <input style={{...inputStyle,boxSizing:"border-box"}} placeholder="Suche..." value={search} onChange={e=>setSearch(e.target.value)}/>
        <select style={inputStyle} value={filterMat} onChange={e=>setFilterMat(e.target.value)}>
          {usedMats.map(m=><option key={m}>{m}</option>)}
        </select>
      </>}
      {tab==="cards"&&<>
        {total>0&&filtered.length===0&&<div style={{textAlign:"center",padding:"30px 0",...mono,color:TEXT_DIM,fontSize:12}}>Keine Treffer</div>}
        {filtered.map(f=><FilamentCard key={f.id} fil={f} onEdit={x=>setModal(x)} onDelete={handleDelete}/>)}
      </>}
      {tab==="list"&&<ListView filaments={filaments} onEdit={x=>setModal(x)}/>}
    </div>}

    {/* QR Scanner Screen */}
    {screen==="qr"&&<QRScannerScreen filaments={filaments}/>}

    {/* Bottom Tab Bar */}
    <div style={{position:"fixed",bottom:0,left:"50%",transform:"translateX(-50%)",width:"100%",maxWidth:430,
      background:SURFACE,borderTop:`1px solid ${BORDER}`,display:"flex",zIndex:20,
      paddingBottom:"env(safe-area-inset-bottom)"}}>
      <button onClick={()=>setScreen("home")} style={{flex:1,padding:"12px 0",background:"none",border:"none",
        color:screen==="home"?MINT:TEXT_DIM,cursor:"pointer",fontSize:11,...mono,display:"flex",flexDirection:"column",alignItems:"center",gap:3}}>
        <span style={{fontSize:18}}>⌂</span>HOME
      </button>
      <button onClick={()=>goInventory("cards")} style={{flex:1,padding:"12px 0",background:"none",border:"none",
        color:screen==="inventory"&&tab==="cards"?MINT:TEXT_DIM,cursor:"pointer",fontSize:11,...mono,display:"flex",flexDirection:"column",alignItems:"center",gap:3}}>
        <span style={{fontSize:18}}>⊞</span>KARTEN
      </button>
      <button onClick={()=>goInventory("list")} style={{flex:1,padding:"12px 0",background:"none",border:"none",
        color:screen==="inventory"&&tab==="list"?MINT:TEXT_DIM,cursor:"pointer",fontSize:11,...mono,display:"flex",flexDirection:"column",alignItems:"center",gap:3}}>
        <span style={{fontSize:18}}>☰</span>LISTE
      </button>
      <button onClick={()=>setScreen("qr")} style={{flex:1,padding:"12px 0",background:"none",border:"none",
        color:screen==="qr"?MINT:TEXT_DIM,cursor:"pointer",fontSize:11,...mono,display:"flex",flexDirection:"column",alignItems:"center",gap:3}}>
        <span style={{fontSize:18}}>▦</span>SCAN
      </button>
    </div>

    </div>
    {dupeCheck&&<DuplicateModal
      existing={dupeCheck.existing}
      onMerge={handleMerge}
      onNew={handleForceNew}
      onClose={()=>setDupeCheck(null)}
    />}
    {modal==="add"&&<FilamentModal onSave={handleSave} onClose={()=>setModal(null)} printers={printers} onAddPrinter={handleAddPrinter}/>}
    {modal==="move"&&<MoveModal filaments={filaments} onMove={handleMove} onClose={()=>setModal(null)} printers={printers} onAddPrinter={handleAddPrinter}/>}
    {modal==="settings"&&<SettingsModal onClose={()=>setModal(null)} printers={printers} onSavePrinters={p=>{setPrinters(p);savePrinters(p);}} allFilaments={filaments} onImport={(fils,prts)=>{setFilaments(fils);saveFilaments(fils);setPrinters(prts);savePrinters(prts);setModal(null);}}/>}
    {modal==="scanDelete"&&<ScanDeleteModal filaments={filaments} onDelete={id=>setFilaments(f=>f.filter(x=>x.id!==id))} onClose={()=>setModal(null)}/>}
    {modal&&modal!=="add"&&modal!=="move"&&modal!=="settings"&&modal!=="scanDelete"&&
      <FilamentModal initial={modal} onSave={handleSave} onDelete={id=>{setFilaments(f=>f.filter(x=>x.id!==id));setModal(null);}} onClose={()=>setModal(null)} printers={printers} onAddPrinter={handleAddPrinter}/>}
  </div>;
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
<script>if("serviceWorker" in navigator){navigator.serviceWorker.register("./sw.js");}</script>
</body>
</html>
