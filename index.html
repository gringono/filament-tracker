<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
  <meta name="apple-mobile-web-app-title" content="Filament"/>
  <meta name="theme-color" content="#86efac"/>
  <link rel="manifest" href="./manifest.json"/>
  <link rel="apple-touch-icon" href="./icon-192.png"/>
  <title>Filament Tracker</title>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;700&display=swap" rel="stylesheet"/>
  <style>
    *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
    html,body{margin:0;padding:0;background:#080c0a;color:#d4f0dc;font-family:'IBM Plex Mono',monospace;overscroll-behavior:none;}
    input,select,button,textarea{font-family:'IBM Plex Mono',monospace;}
    input[type=number]::-webkit-inner-spin-button{opacity:1;}
    ::-webkit-scrollbar{width:4px;}
    ::-webkit-scrollbar-track{background:#0e1410;}
    ::-webkit-scrollbar-thumb{background:#1a2e1e;border-radius:2px;}
    select option{background:#0e1410;color:#d4f0dc;}
  </style>
</head>
<body>
<div id="root"></div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
<script type="text/babel">
const {useState,useEffect,useRef,useCallback}=React;

const VERSION="v3.0";
const STORAGE_KEY="filament_v3";
const API_KEY_KEY="filament_apikey";
const PRINTERS_KEY="filament_printers";
const DEFAULT_PRINTERS=["Bambu H2C","VCore 4.1","HevOrt"];
const MATERIALS=["PLA","PETG","ABS","ASA","ABS-GF","XPETG","TPU","PA","PC","PVA","HIPS","CF","Sonstiges"];
const DIAMETERS=[1.75,2.85];

const MINT="#86efac",BG="#080c0a",SURFACE="#0e1410",SURFACE2="#141c16";
const BORDER="#1a2e1e",TEXT="#d4f0dc",TEXT_DIM="#8ecf9a",TEXT_MUTED="#4a7a56";
const mono={fontFamily:"'IBM Plex Mono',monospace"};

// ── Storage ──
function loadFilaments(){try{return JSON.parse(localStorage.getItem(STORAGE_KEY))||[];}catch{return[];}}
function saveFilaments(d){localStorage.setItem(STORAGE_KEY,JSON.stringify(d));}
function loadApiKey(){return localStorage.getItem(API_KEY_KEY)||"";}
function saveApiKey(k){localStorage.setItem(API_KEY_KEY,k);}
function loadPrinters(){try{return JSON.parse(localStorage.getItem(PRINTERS_KEY))||DEFAULT_PRINTERS;}catch{return DEFAULT_PRINTERS;}}
function savePrinters(p){localStorage.setItem(PRINTERS_KEY,JSON.stringify(p));}

function genId(){return Math.random().toString(36).slice(2,9)+Date.now().toString(36);}

function calcPct(w,full){if(!full)return 0;return Math.min(100,Math.max(0,Math.round(w/full*100)));}

function gramColor(w,full){
  if(!full||w<=100)return"#ff2020";
  const t=Math.min(1,(w-100)/(full-100));
  const r=t<0.5?255:Math.round(255*(1-(t-0.5)*2));
  const g=t<0.5?Math.round(t*2*200):200;
  return`rgb(${r},${g},0)`;
}

// ── AI Scan ──
async function scanLabel(b64,mediaType,mode,apiKey){
  const sys=mode==="add"
    ?`Filament label reader. Return ONLY valid JSON no markdown: {"brand":"","material":"PLA","colorName":"","colorHex":"#aaaaaa","diameter":1.75,"fullWeight":1000,"notes":""}. fullWeight in grams default 1000.`
    :`Filament label reader. Return ONLY valid JSON: {"brand":"","material":"","colorName":"","colorHex":""}`;
  const res=await fetch("https://api.anthropic.com/v1/messages",{
    method:"POST",
    headers:{"Content-Type":"application/json","x-api-key":apiKey,"anthropic-version":"2023-06-01","anthropic-dangerous-direct-browser-access":"true"},
    body:JSON.stringify({model:"claude-haiku-4-5",max_tokens:500,system:sys,
      messages:[{role:"user",content:[
        {type:"image",source:{type:"base64",media_type:mediaType,data:b64}},
        {type:"text",text:"Extract filament info."}
      ]}]
    })
  });
  const data=await res.json();
  if(data.error)throw new Error(data.error.message);
  const text=data.content?.map(b=>b.text||"").join("")||"{}";
  return JSON.parse(text.replace(/```json|```/g,"").trim());
}

function matchScore(fil,scan){
  let s=0;
  if(scan.brand&&fil.brand?.toLowerCase().includes(scan.brand.toLowerCase()))s+=3;
  if(scan.material&&fil.material?.toLowerCase()===scan.material.toLowerCase())s+=3;
  if(scan.colorName&&fil.colorName?.toLowerCase().includes(scan.colorName.toLowerCase()))s+=2;
  if(scan.colorHex&&fil.colorHex){
    try{
      const p=h=>[parseInt(h.slice(1,3),16),parseInt(h.slice(3,5),16),parseInt(h.slice(5,7),16)];
      const [r1,g1,b1]=p(scan.colorHex),[r2,g2,b2]=p(fil.colorHex);
      if(Math.sqrt((r1-r2)**2+(g1-g2)**2+(b1-b2)**2)<60)s+=1;
    }catch{}
  }
  return s;
}

// ── UI Primitives ──
const inputStyle={...mono,background:SURFACE,border:`1px solid ${BORDER}`,borderRadius:6,
  color:TEXT,padding:"8px 10px",fontSize:13,width:"100%",boxSizing:"border-box",outline:"none",WebkitAppearance:"none"};
const labelCss={...mono,color:TEXT_DIM,fontSize:10,marginBottom:3,display:"block",letterSpacing:"0.08em"};

function ColorChip({hex,size=28}){
  return <div style={{width:size,height:size,borderRadius:4,background:hex||"#333",border:`1px solid rgba(134,239,172,0.15)`,flexShrink:0}}/>;
}
function RemainingBar({weight,fullWeight}){
  const pct=calcPct(weight,fullWeight);
  const color=gramColor(weight,fullWeight);
  return <div style={{width:"100%",height:4,background:"#0e1c12",borderRadius:3,overflow:"hidden"}}>
    <div style={{width:`${pct}%`,height:"100%",background:color,transition:"width 0.3s,background 0.3s"}}/>
  </div>;
}
function Badge({color,bg,children}){
  return <span style={{...mono,background:bg||SURFACE2,color:color||TEXT_DIM,fontSize:10,padding:"2px 7px",borderRadius:4,whiteSpace:"nowrap"}}>{children}</span>;
}
function Field({label,children}){
  return <div style={{display:"flex",flexDirection:"column"}}><span style={labelCss}>{label}</span>{children}</div>;
}
function PhotoButton({label,onChange,loading}){
  const ref=useRef();
  return <>
    <button onClick={()=>ref.current.click()} style={{
      width:"100%",padding:"12px 0",background:"#051828",
      border:`1.5px solid ${loading?"#facc15":"#00cfff"}`,borderRadius:8,
      color:loading?"#facc15":"#00cfff",cursor:"pointer",fontSize:13,...mono,
      boxShadow:loading?"none":"0 0 12px rgba(0,207,255,0.35),inset 0 0 20px rgba(0,207,255,0.07)"
    }}>{loading?"⏳ Scanne...":label}</button>
    <input ref={ref} type="file" accept="image/*" capture="environment" onChange={onChange} style={{display:"none"}}/>
  </>;
}
function Modal({title,children,onClose}){
  return <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.92)",zIndex:100,display:"flex",alignItems:"flex-end",justifyContent:"center"}}>
    <div style={{background:SURFACE,border:`1px solid ${BORDER}`,borderRadius:"16px 16px 0 0",
      width:"100%",maxWidth:520,maxHeight:"94vh",overflowY:"auto",
      padding:"20px 16px calc(24px + env(safe-area-inset-bottom))",display:"flex",flexDirection:"column",gap:12}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
        <span style={{color:MINT,fontWeight:700,fontSize:16,...mono}}>{title}</span>
        <button onClick={onClose} style={{background:"none",border:"none",color:TEXT_DIM,fontSize:22,cursor:"pointer",lineHeight:1}}>✕</button>
      </div>
      {children}
    </div>
  </div>;
}

// ── Printer Combo ──
function PrinterSelect({value,onChange,printers}){
  const [custom,setCustom]=useState(false);
  const [customVal,setCustomVal]=useState("");
  function handleSelect(v){
    if(v==="__new__"){setCustom(true);setCustomVal("");}
    else{setCustom(false);onChange(v);}
  }
  function confirmCustom(){
    const v=customVal.trim();
    if(v){onChange(v);setCustom(false);}
  }
  return <div style={{display:"flex",flexDirection:"column",gap:4}}>
    <select style={inputStyle} value={custom?"__new__":value} onChange={e=>handleSelect(e.target.value)}>
      <option value="">— kein Drucker —</option>
      {printers.map(p=><option key={p}>{p}</option>)}
      <option value="__new__">✏️ Neuer Drucker...</option>
    </select>
    {custom&&<div style={{display:"flex",gap:6}}>
      <input style={{...inputStyle,flex:1}} value={customVal} onChange={e=>setCustomVal(e.target.value)}
        placeholder="Druckername..." autoFocus onKeyDown={e=>e.key==="Enter"&&confirmCustom()}/>
      <button onClick={confirmCustom} style={{background:MINT,color:"#000",border:"none",borderRadius:6,padding:"0 12px",cursor:"pointer",fontWeight:700,...mono}}>OK</button>
    </div>}
  </div>;
}

// ── Material Combo ──
function MaterialCombo({value,onChange}){
  const [custom,setCustom]=useState(!MATERIALS.includes(value));
  return <div style={{display:"flex",flexDirection:"column",gap:4}}>
    <select style={inputStyle} value={custom?"__custom__":value}
      onChange={e=>{if(e.target.value==="__custom__"){setCustom(true);onChange("");}else{setCustom(false);onChange(e.target.value);}}}>
      {MATERIALS.map(m=><option key={m}>{m}</option>)}
      <option value="__custom__">✏️ Eigene Eingabe...</option>
    </select>
    {custom&&<input style={{...inputStyle,borderColor:MINT}} value={value} onChange={e=>onChange(e.target.value)} placeholder="z.B. PLA-CF, PAHT..." autoFocus/>}
  </div>;
}

// ── Filament Card ──
function FilamentCard({fil,onEdit,onDelete,fullWeight}){
  const fw=fil.fullWeight||1000;
  const totalStock=fil.stock||[];
  const totalInUse=fil.inUse||[];
  const totalCount=totalStock.length+totalInUse.length;
  const hasLow=totalInUse.some(u=>u.weight<=100)||totalStock.some(s=>s.weight<=100);

  return <div style={{background:SURFACE,border:`1px solid ${totalInUse.length>0?"#1a4020":BORDER}`,borderRadius:10,padding:"12px 14px",display:"flex",flexDirection:"column",gap:8}}>
    {/* Header */}
    <div style={{display:"flex",alignItems:"center",gap:10}}>
      <ColorChip hex={fil.colorHex} size={32}/>
      <div style={{flex:1,minWidth:0}}>
        <div style={{color:TEXT,fontWeight:700,fontSize:14,...mono,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>
          {fil.brand||"—"} <span style={{color:TEXT_DIM,fontWeight:400}}>{fil.colorName}</span>
        </div>
        <div style={{display:"flex",gap:5,marginTop:3,flexWrap:"wrap"}}>
          <Badge color={MINT}>{fil.material}</Badge>
          <Badge>{fil.diameter}mm</Badge>
          <Badge>{fw}g/Spule</Badge>
          <Badge color={hasLow?"#f87171":TEXT_DIM}>{totalCount} Spule{totalCount!==1?"n":""}</Badge>
        </div>
      </div>
      <div style={{display:"flex",gap:6}}>
        <button onClick={()=>onEdit(fil)} style={{background:SURFACE2,color:TEXT_DIM,border:`1px solid ${BORDER}`,borderRadius:6,padding:"6px 9px",cursor:"pointer",fontSize:13}}>✏️</button>
        <button onClick={()=>onDelete(fil.id)} style={{background:"#1a0808",color:"#f87171",border:"1px solid #2e1010",borderRadius:6,padding:"6px 9px",cursor:"pointer",fontSize:13}}>✕</button>
      </div>
    </div>

    {/* Stock */}
    {totalStock.length>0&&<div style={{borderTop:`1px solid ${BORDER}`,paddingTop:8,display:"flex",flexDirection:"column",gap:5}}>
      <div style={{...mono,color:TEXT_DIM,fontSize:9,letterSpacing:"0.1em"}}>📦 LAGER</div>
      {/* Group full spools by location */}
      {Object.entries(totalStock.reduce((acc,s)=>{
        const key=`${s.location||"?"}__${s.weight===fw?"full":"partial"}`;
        if(!acc[key])acc[key]={location:s.location||"?",weight:s.weight,count:0,isFull:s.weight>=fw};
        acc[key].count++;
        return acc;
      },{})).map(([key,grp])=>(
        <div key={key}>
          <div style={{display:"flex",justifyContent:"space-between",marginBottom:grp.isFull?0:3}}>
            <span style={{...mono,color:TEXT,fontSize:11}}>
              {grp.count>1?`${grp.count}× `:""}{grp.location}
              {grp.isFull&&<span style={{color:TEXT_DIM}}> · voll</span>}
            </span>
            {!grp.isFull&&<span style={{...mono,color:grp.weight<=100?"#f87171":TEXT,fontSize:11,fontWeight:700}}>
              {grp.weight}g <span style={{color:TEXT_MUTED}}>/ {fw}g ({calcPct(grp.weight,fw)}%)</span>
            </span>}
          </div>
          {!grp.isFull&&<RemainingBar weight={grp.weight} fullWeight={fw}/>}
        </div>
      ))}
    </div>}

    {/* In Use */}
    {totalInUse.length>0&&<div style={{borderTop:`1px solid ${BORDER}`,paddingTop:8,display:"flex",flexDirection:"column",gap:6}}>
      <div style={{...mono,color:TEXT_DIM,fontSize:9,letterSpacing:"0.1em"}}>🖨 IN GEBRAUCH</div>
      {totalInUse.map(u=>(
        <div key={u.id}>
          <div style={{display:"flex",justifyContent:"space-between",marginBottom:3}}>
            <span style={{...mono,color:MINT,fontSize:11}}>{u.printer}</span>
            <span style={{...mono,color:u.weight<=100?"#f87171":TEXT,fontSize:11,fontWeight:700}}>
              {u.weight}g <span style={{color:TEXT_MUTED}}>/ {fw}g ({calcPct(u.weight,fw)}%)</span>
            </span>
          </div>
          <RemainingBar weight={u.weight} fullWeight={fw}/>
        </div>
      ))}
    </div>}
  </div>;
}

// ── Add/Edit Modal ──
function FilamentModal({initial,onSave,onClose,printers,onAddPrinter}){
  const fw=initial?.fullWeight||1000;
  const [form,setForm]=useState({
    brand:"",material:"PLA",colorName:"",colorHex:"#aaaaaa",
    diameter:1.75,fullWeight:1000,
    stock:[],inUse:[],
    ...(initial||{})
  });
  const [scanning,setScanning]=useState(false);
  const [scanError,setScanError]=useState("");
  const [preview,setPreview]=useState(null);
  const set=(k,v)=>setForm(f=>({...f,[k]:v}));

  const fullW=form.fullWeight||1000;

  // Stock helpers
  function addStock(){setForm(f=>({...f,stock:[...f.stock,{id:genId(),location:"Lager",weight:f.fullWeight}]}));}
  function updateStock(id,key,val){setForm(f=>({...f,stock:f.stock.map(s=>s.id===id?{...s,[key]:val}:s)}));}
  function removeStock(id){setForm(f=>({...f,stock:f.stock.filter(s=>s.id!==id)}));}

  // InUse helpers
  function addInUse(){setForm(f=>({...f,inUse:[...f.inUse,{id:genId(),printer:printers[0]||"",weight:f.fullWeight}]}));}
  function updateInUse(id,key,val){setForm(f=>({...f,inUse:f.inUse.map(u=>u.id===id?{...u,[key]:val}:u)}));}
  function removeInUse(id){setForm(f=>({...f,inUse:f.inUse.filter(u=>u.id!==id)}));}

  async function handlePhoto(e){
    const file=e.target.files[0];if(!file)return;
    const apiKey=loadApiKey();
    if(!apiKey){setScanError("Kein API Key. Bitte in ⚙️ eintragen.");return;}
    setScanError("");setScanning(true);
    const reader=new FileReader();
    reader.onload=async()=>{
      const b64=reader.result.split(",")[1];
      setPreview(reader.result);
      try{
        const r=await scanLabel(b64,file.type,"add",apiKey);
        const nw=r.fullWeight||r.totalWeight||form.fullWeight;
        setForm(f=>({...f,
          brand:r.brand||f.brand,
          material:MATERIALS.includes(r.material)?r.material:(r.material||f.material),
          colorName:r.colorName||f.colorName,
          colorHex:r.colorHex||f.colorHex,
          diameter:DIAMETERS.includes(r.diameter)?r.diameter:f.diameter,
          fullWeight:nw,
          notes:r.notes||f.notes,
        }));
      }catch(err){setScanError("Scan fehlgeschlagen: "+err.message);}
      setScanning(false);
    };
    reader.readAsDataURL(file);
  }

  function handleSave(){
    // collect new printers
    const allPrinters=[...new Set([...printers,...form.inUse.map(u=>u.printer).filter(Boolean)])];
    onAddPrinter(allPrinters);
    onSave(form);
  }

  const sectionHead={...mono,color:TEXT_DIM,fontSize:10,letterSpacing:"0.1em",marginBottom:4};
  const addBtn=(label,fn)=><button onClick={fn} style={{
    background:"none",border:`1px dashed ${BORDER}`,borderRadius:6,color:TEXT_DIM,
    padding:"7px 0",cursor:"pointer",fontSize:12,...mono,width:"100%"
  }}>{label}</button>;

  return <Modal onClose={onClose} title={initial?.id?"Filament bearbeiten":"Neues Filament"}>
    {!initial?.id&&<div style={{display:"flex",flexDirection:"column",gap:6}}>
      <PhotoButton label="📷 Etikett scannen" onChange={handlePhoto} loading={scanning}/>
      {scanError&&<div style={{color:"#f87171",fontSize:11,...mono}}>{scanError}</div>}
      {preview&&!scanning&&<div style={{display:"flex",alignItems:"center",gap:8}}>
        <img src={preview} alt="" style={{height:46,borderRadius:5,border:`1px solid ${BORDER}`}}/>
        <span style={{...mono,color:MINT,fontSize:10}}>✓ Scan ok — Felder prüfen</span>
      </div>}
    </div>}

    {/* Base info */}
    <div style={{background:SURFACE2,borderRadius:8,padding:"10px 12px",display:"flex",flexDirection:"column",gap:10}}>
      <div style={sectionHead}>FILAMENT-INFO</div>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
        <Field label="HERSTELLER"><input style={inputStyle} value={form.brand} onChange={e=>set("brand",e.target.value)} placeholder="Bambu Lab"/></Field>
        <Field label="FARBE"><input style={inputStyle} value={form.colorName} onChange={e=>set("colorName",e.target.value)} placeholder="Black"/></Field>
      </div>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
        <Field label="MATERIAL"><MaterialCombo value={form.material} onChange={v=>set("material",v)}/></Field>
        <Field label="FARBE (HEX)">
          <div style={{display:"flex",gap:7,alignItems:"center"}}>
            <input type="color" value={form.colorHex} onChange={e=>set("colorHex",e.target.value)}
              style={{width:36,height:36,border:`1px solid ${BORDER}`,borderRadius:6,background:SURFACE,cursor:"pointer",padding:2,flexShrink:0}}/>
            <input style={{...inputStyle,flex:1}} value={form.colorHex} onChange={e=>set("colorHex",e.target.value)}/>
          </div>
        </Field>
      </div>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
        <Field label="DURCHMESSER">
          <select style={inputStyle} value={form.diameter} onChange={e=>set("diameter",parseFloat(e.target.value))}>
            {DIAMETERS.map(d=><option key={d} value={d}>{d} mm</option>)}
          </select>
        </Field>
        <Field label="VOLLGEWICHT (g)"><input style={inputStyle} type="number" value={form.fullWeight} onChange={e=>set("fullWeight",parseInt(e.target.value)||0)}/></Field>
      </div>
    </div>

    {/* Stock */}
    <div style={{background:SURFACE2,borderRadius:8,padding:"10px 12px",display:"flex",flexDirection:"column",gap:8}}>
      <div style={sectionHead}>📦 LAGER ({form.stock.length} Spule{form.stock.length!==1?"n":""})</div>
      {form.stock.map(s=>(
        <div key={s.id} style={{background:SURFACE,borderRadius:6,padding:"8px 10px",display:"flex",flexDirection:"column",gap:6}}>
          <div style={{display:"flex",gap:6,alignItems:"center"}}>
            <input style={{...inputStyle,flex:1}} value={s.location} onChange={e=>updateStock(s.id,"location",e.target.value)} placeholder="Lagerort"/>
            <input style={{...inputStyle,width:90}} type="number" value={s.weight} onChange={e=>updateStock(s.id,"weight",parseInt(e.target.value)||0)} placeholder="Gramm"/>
            <button onClick={()=>removeStock(s.id)} style={{background:"#1a0808",color:"#f87171",border:"none",borderRadius:5,padding:"6px 8px",cursor:"pointer",fontSize:12,flexShrink:0}}>✕</button>
          </div>
          <div style={{display:"flex",justifyContent:"space-between"}}>
            <span style={{...mono,fontSize:10,color:TEXT_DIM}}>{calcPct(s.weight,fullW)}%</span>
            <button onClick={()=>updateStock(s.id,"weight",form.fullWeight)} style={{...mono,background:"none",border:"none",color:TEXT_DIM,fontSize:10,cursor:"pointer",padding:0}}>→ voll ({form.fullWeight}g)</button>
          </div>
          <RemainingBar weight={s.weight} fullWeight={fullW}/>
        </div>
      ))}
      {addBtn("+ Spule im Lager hinzufügen",addStock)}
    </div>

    {/* In Use */}
    <div style={{background:SURFACE2,borderRadius:8,padding:"10px 12px",display:"flex",flexDirection:"column",gap:8}}>
      <div style={sectionHead}>🖨 IN GEBRAUCH ({form.inUse.length} Spule{form.inUse.length!==1?"n":""})</div>
      {form.inUse.map(u=>(
        <div key={u.id} style={{background:SURFACE,borderRadius:6,padding:"8px 10px",display:"flex",flexDirection:"column",gap:6}}>
          <div style={{display:"flex",gap:6,alignItems:"center"}}>
            <div style={{flex:1}}>
              <PrinterSelect value={u.printer} onChange={v=>updateInUse(u.id,"printer",v)} printers={printers}/>
            </div>
            <input style={{...inputStyle,width:90}} type="number" value={u.weight} onChange={e=>updateInUse(u.id,"weight",parseInt(e.target.value)||0)} placeholder="Gramm"/>
            <button onClick={()=>removeInUse(u.id)} style={{background:"#1a0808",color:"#f87171",border:"none",borderRadius:5,padding:"6px 8px",cursor:"pointer",fontSize:12,flexShrink:0}}>✕</button>
          </div>
          <div style={{display:"flex",justifyContent:"space-between"}}>
            <span style={{...mono,fontSize:10,color:TEXT_DIM}}>{calcPct(u.weight,fullW)}%</span>
            <button onClick={()=>updateInUse(u.id,"weight",form.fullWeight)} style={{...mono,background:"none",border:"none",color:TEXT_DIM,fontSize:10,cursor:"pointer",padding:0}}>→ voll ({form.fullWeight}g)</button>
          </div>
          <RemainingBar weight={u.weight} fullWeight={fullW}/>
        </div>
      ))}
      {addBtn("+ Spule in Drucker hinzufügen",addInUse)}
    </div>

    <button onClick={handleSave} style={{
      background:MINT,color:"#000",border:"none",borderRadius:8,
      padding:"13px 0",fontWeight:700,fontSize:15,cursor:"pointer",...mono,width:"100%",marginTop:4
    }}>Speichern</button>
  </Modal>;
}

// ── Scan Delete Modal ──
function ScanDeleteModal({filaments,onDelete,onClose}){
  const [scanning,setScanning]=useState(false);
  const [matches,setMatches]=useState(null);
  const [scanError,setScanError]=useState("");
  const [preview,setPreview]=useState(null);

  async function handlePhoto(e){
    const file=e.target.files[0];if(!file)return;
    const apiKey=loadApiKey();
    if(!apiKey){setScanError("Kein API Key. Bitte in ⚙️ eintragen.");return;}
    setScanError("");setMatches(null);setScanning(true);
    const reader=new FileReader();
    reader.onload=async()=>{
      const b64=reader.result.split(",")[1];
      setPreview(reader.result);
      try{
        const scan=await scanLabel(b64,file.type,"find",apiKey);
        const scored=filaments.map(f=>({fil:f,score:matchScore(f,scan)}))
          .filter(x=>x.score>0).sort((a,b)=>b.score-a.score).slice(0,3);
        setMatches(scored);
      }catch(err){setScanError("Scan fehlgeschlagen: "+err.message);}
      setScanning(false);
    };
    reader.readAsDataURL(file);
  }

  return <Modal onClose={onClose} title="Filament suchen & löschen">
    <div style={{...mono,color:TEXT_DIM,fontSize:11}}>Fotografiere das Etikett des Filaments das du entfernen möchtest.</div>
    <PhotoButton label="📷 Etikett scannen" onChange={handlePhoto} loading={scanning}/>
    {scanError&&<div style={{color:"#f87171",fontSize:11,...mono}}>{scanError}</div>}
    {preview&&<div><img src={preview} alt="" style={{height:46,borderRadius:5,border:`1px solid ${BORDER}`}}/></div>}
    {matches!==null&&<div style={{display:"flex",flexDirection:"column",gap:6}}>
      {matches.length===0
        ?<div style={{...mono,color:"#f87171",fontSize:12,textAlign:"center",padding:"16px 0"}}>Kein passendes Filament gefunden.</div>
        :<>
          <div style={{...mono,color:TEXT_DIM,fontSize:10}}>TREFFER:</div>
          {matches.map(({fil})=>(
            <button key={fil.id}
              onClick={()=>{if(confirm(`"${fil.brand} ${fil.colorName}" löschen?`)){onDelete(fil.id);onClose();}}}
              style={{background:"#180a0a",border:"1px solid #2e1010",borderRadius:8,padding:"10px 12px",cursor:"pointer",display:"flex",alignItems:"center",gap:10,textAlign:"left",width:"100%"}}>
              <ColorChip hex={fil.colorHex} size={28}/>
              <div style={{flex:1}}>
                <div style={{color:TEXT,fontSize:13,fontWeight:700,...mono}}>{fil.brand} {fil.colorName}</div>
                <div style={{color:TEXT_DIM,fontSize:10,...mono}}>{fil.material} · {(fil.stock?.length||0)+(fil.inUse?.length||0)} Spulen</div>
              </div>
              <span style={{...mono,color:"#f87171",fontSize:13}}>✕</span>
            </button>
          ))}
        </>
      }
    </div>}
  </Modal>;
}

// ── Settings Modal ──
function SettingsModal({onClose,printers,onSavePrinters}){
  const [key,setKey]=useState(loadApiKey());
  const [saved,setSaved]=useState(false);
  const [printerList,setPrinterList]=useState(printers.join("\n"));

  function handleSave(){
    saveApiKey(key.trim());
    onSavePrinters(printerList.split("\n").map(p=>p.trim()).filter(Boolean));
    setSaved(true);setTimeout(()=>setSaved(false),1500);
  }

  return <Modal title="⚙️ Einstellungen" onClose={onClose}>
    <div style={{...mono,color:TEXT_DIM,fontSize:11,lineHeight:1.7}}>
      Für KI-Etikett-Scan: Anthropic API Key<br/>
      <span style={{color:TEXT_DIM}}>1. </span><span style={{color:TEXT}}>console.anthropic.com</span><br/>
      <span style={{color:TEXT_DIM}}>2. </span>Account + Kreditkarte + $5 Guthaben<br/>
      <span style={{color:TEXT_DIM}}>3. </span>API Keys → Create Key → kopieren
    </div>
    <Field label="ANTHROPIC API KEY">
      <input style={inputStyle} type="password" value={key} onChange={e=>setKey(e.target.value)} placeholder="sk-ant-..."/>
    </Field>
    <Field label="DRUCKER-LISTE (eine pro Zeile)">
      <textarea style={{...inputStyle,height:100,resize:"none",lineHeight:1.6}} value={printerList} onChange={e=>setPrinterList(e.target.value)}/>
    </Field>
    <button onClick={handleSave} style={{
      background:saved?"#1a4020":MINT,color:saved?MINT:"#000",border:saved?`1px solid ${MINT}`:"none",
      borderRadius:8,padding:"12px 0",fontWeight:700,fontSize:14,cursor:"pointer",...mono,width:"100%"
    }}>{saved?"✓ Gespeichert":"Speichern"}</button>
    <div style={{...mono,color:TEXT_MUTED,fontSize:10,textAlign:"center"}}>Key wird nur lokal gespeichert.</div>
  </Modal>;
}

// ── Main App ──
function App(){
  const [filaments,setFilaments]=useState(loadFilaments);
  const [printers,setPrinters]=useState(loadPrinters);
  const [modal,setModal]=useState(null);
  const [filterMat,setFilterMat]=useState("Alle");
  const [search,setSearch]=useState("");

  useEffect(()=>{saveFilaments(filaments);},[filaments]);
  useEffect(()=>{savePrinters(printers);},[printers]);

  function handleSave(form){
    if(form.id)setFilaments(f=>f.map(x=>x.id===form.id?form:x));
    else setFilaments(f=>[...f,{...form,id:genId(),addedAt:Date.now()}]);
    setModal(null);
  }
  function handleDelete(id){
    if(confirm("Filament löschen?"))setFilaments(f=>f.filter(x=>x.id!==id));
  }
  function handleAddPrinter(list){
    setPrinters(list);
  }

  const total=filaments.length;
  const totalSpools=filaments.reduce((a,f)=>(f.stock?.length||0)+(f.inUse?.length||0)+a,0);
  const lowCount=filaments.filter(f=>[...(f.stock||[]),...(f.inUse||[])].some(s=>s.weight<=100)).length;
  const inUseCount=filaments.reduce((a,f)=>a+(f.inUse?.length||0),0);
  const usedMats=["Alle",...new Set(filaments.map(f=>f.material))];

  const filtered=filaments.filter(f=>{
    if(filterMat!=="Alle"&&f.material!==filterMat)return false;
    if(search){const q=search.toLowerCase();if(!`${f.brand} ${f.colorName} ${f.material}`.toLowerCase().includes(q))return false;}
    return true;
  });

  return <div style={{minHeight:"100vh",background:BG,color:TEXT,paddingBottom:"calc(80px + env(safe-area-inset-bottom))"}}>
    {/* Header */}
    <div style={{background:SURFACE,borderBottom:`1px solid ${BORDER}`,padding:"calc(14px + env(safe-area-inset-top)) 14px 12px",position:"sticky",top:0,zIndex:10}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
        <div>
          <div style={{fontSize:17,fontWeight:700,...mono,color:MINT}}>🧵 FILAMENT <span style={{fontSize:9,color:TEXT_DIM,fontWeight:400}}>{VERSION}</span></div>
          <div style={{...mono,fontSize:10,color:TEXT_DIM,marginTop:2}}>
            {total} Typen · {totalSpools} Spulen
            {lowCount>0&&<span style={{color:"#f87171"}}> · {lowCount} fast leer</span>}
            {inUseCount>0&&<span style={{color:MINT}}> · {inUseCount} in Drucker</span>}
          </div>
        </div>
        <div style={{display:"flex",gap:8,alignItems:"center"}}>
          <button onClick={()=>setModal("settings")} style={{background:"none",border:"none",color:TEXT_DIM,fontSize:18,cursor:"pointer",padding:"4px 6px"}}>⚙️</button>
          {total>0&&<button onClick={()=>setModal("scanDelete")} style={{...mono,background:"#180a0a",color:"#f87171",border:"1px solid #2e1010",borderRadius:8,padding:"8px 12px",fontSize:12,cursor:"pointer"}}>🔍</button>}
          {total>0&&<button onClick={()=>setModal("add")} style={{...mono,background:MINT,color:"#000",border:"none",borderRadius:8,padding:"9px 14px",fontWeight:700,fontSize:13,cursor:"pointer"}}>+ Neu</button>}
        </div>
      </div>
    </div>

    <div style={{padding:"12px 14px",display:"flex",flexDirection:"column",gap:10}}>
      {total>0&&<>
        <input style={{...inputStyle,boxSizing:"border-box"}} placeholder="Suche..." value={search} onChange={e=>setSearch(e.target.value)}/>
        <select style={inputStyle} value={filterMat} onChange={e=>setFilterMat(e.target.value)}>
          {usedMats.map(m=><option key={m}>{m}</option>)}
        </select>
      </>}

      {total===0&&<div style={{textAlign:"center",padding:"24px 10px 20px",marginTop:4}}>
        <NeonIllustration/>
        <div style={{...mono,fontSize:15,color:MINT,marginTop:18,fontWeight:700}}>Was liegt da eigentlich rum?</div>
        <div style={{...mono,fontSize:11,color:TEXT_DIM,marginTop:6,lineHeight:1.7}}>Keine Ahnung welches Filament du hast?<br/>Genau dafür ist das hier.</div>
        <button onClick={()=>setModal("add")} style={{...mono,background:MINT,color:"#000",border:"none",borderRadius:8,padding:"12px 28px",fontWeight:700,fontSize:14,cursor:"pointer",marginTop:20}}>+ Filament erfassen</button>
      </div>}

      {total>0&&filtered.length===0&&<div style={{textAlign:"center",padding:"30px 0",...mono,color:TEXT_DIM,fontSize:12}}>Keine Treffer</div>}
      {filtered.map(f=><FilamentCard key={f.id} fil={f} onEdit={x=>setModal(x)} onDelete={handleDelete}/>)}
    </div>

    {modal==="add"&&<FilamentModal onSave={handleSave} onClose={()=>setModal(null)} printers={printers} onAddPrinter={handleAddPrinter}/>}
    {modal==="settings"&&<SettingsModal onClose={()=>setModal(null)} printers={printers} onSavePrinters={p=>{setPrinters(p);savePrinters(p);}}/>}
    {modal==="scanDelete"&&<ScanDeleteModal filaments={filaments} onDelete={id=>setFilaments(f=>f.filter(x=>x.id!==id))} onClose={()=>setModal(null)}/>}
    {modal&&modal!=="add"&&modal!=="settings"&&modal!=="scanDelete"&&
      <FilamentModal initial={modal} onSave={handleSave} onClose={()=>setModal(null)} printers={printers} onAddPrinter={handleAddPrinter}/>}
  </div>;
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
<script>if("serviceWorker" in navigator){navigator.serviceWorker.register("./sw.js");}</script>
</body>
